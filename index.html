<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Required</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Force full screen and remove default margins */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrollbars */
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a; /* Dark modern background */
        }

        .fullscreen-card {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        p {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: #94a3b8;
            max-width: 500px;
            margin-bottom: 3rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: #3b82f6;
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .download-btn:hover {
            background-color: #2563eb;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="fullscreen-card">
        <h1>App Expired</h1>
        <p>This version of the application is no longer supported. Please download the latest update to continue.</p>
        
        <a href="https://www.mediafire.com/file/wzpxzsq8paquvlw/Splash+Nova_.apk/file" target="_blank" rel="noopener noreferrer" class="download-btn">
            <i class="fas fa-download"></i> Download Update
        </a>
    </div>

</body>
</html>
